<div class="horario-page">
  <app-navbar></app-navbar>
  <div class="top-bar">
    <a routerLink="/dashboard" class="btn-back">
      <i class="bi bi-arrow-left"></i> Volver al Dashboard
    </a>
    <div class="page-title">
      <i class="bi bi-calendar3"></i>
      <h1>Mi Horario</h1>
    </div>
    <button class="btn-clean" (click)="limpiarHorario()">
      <i class="bi bi-trash3"></i> Limpiar Todo
    </button>
  </div>

  <div class="horario-container">
    <div class="info-banner" *ngIf="!cargandoHorario && ramosCursando.length === 0">
      <i class="bi bi-info-circle-fill"></i>
      <span>No tienes ramos marcados como "Cursando" en tu Malla. Ve a tu malla y marca los ramos que estás tomando actualmente para poder armar tu horario.</span>
    </div>

    <div class="grid-container">
      <!-- Skeleton Loading -->
      <div class="skeleton-container" *ngIf="cargandoHorario">
        <div class="skeleton-header">
          <div class="skeleton-col" *ngFor="let dia of dias"></div>
        </div>
        <div class="skeleton-row" *ngFor="let key of bloquesKeys">
          <div class="skeleton-time"></div>
          <div class="skeleton-cell" *ngFor="let dia of dias"></div>
        </div>
      </div>

      <!-- Tabla Real -->
      <table class="horario-table" *ngIf="!cargandoHorario">
        <thead>
          <tr>
            <th class="time-header"><i class="bi bi-clock-history"></i> Hora</th>
            <th *ngFor="let dia of dias">{{ dia }}</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let bloqueKey of bloquesKeys">
            <td class="time-cell" 
                (click)="iniciarEdicion(bloqueKey)" 
                [class.editing]="editandoBloque === bloqueKey">
              
              <!-- Vista Normal -->
              <span *ngIf="editandoBloque !== bloqueKey">
                {{ etiquetasHora[bloqueKey] }}
                <i class="bi bi-pencil edit-icon"></i>
              </span>

              <!-- Modo Edición -->
              <input *ngIf="editandoBloque === bloqueKey" 
                     type="text" 
                     class="time-input"
                     [(ngModel)]="etiquetasHora[bloqueKey]"
                     (blur)="guardarEtiquetas()"
                     (keyup.enter)="guardarEtiquetas()"
                     autofocus />
            </td>

            <td *ngFor="let dia of dias" class="drop-cell">
              <div class="cell-wrapper" [class.has-content]="getBloque(dia, bloqueKey).ramoId || getBloque(dia, bloqueKey).ramo2Id">
                
                <!-- Ramo 1 -->
                <div class="ramo-slot" [class.filled]="getBloque(dia, bloqueKey).ramoId">
                  <select class="ramo-select-visible" 
                          [ngModel]="getBloque(dia, bloqueKey).ramoId" 
                          (ngModelChange)="asignarRamo(getBloque(dia, bloqueKey), $event, false)"
                          [class.empty-select]="!getBloque(dia, bloqueKey).ramoId">
                    <option [ngValue]="null">---</option>
                    <option *ngFor="let ramo of ramosCursando" [ngValue]="ramo.id">
                      {{ ramo.nombre }}
                    </option>
                  </select>
                  
                  <input *ngIf="getBloque(dia, bloqueKey).ramoId"
                         type="text" 
                         class="detalle-input" 
                         [(ngModel)]="getBloque(dia, bloqueKey).detalle1"
                         (blur)="actualizarDetalle(getBloque(dia, bloqueKey))"
                         (keyup.enter)="actualizarDetalle(getBloque(dia, bloqueKey))"
                         placeholder="Detalle (Ej: LAB)" />
                </div>

                <!-- Ramo 2 -->
                <div class="ramo-slot slot-2" 
                     *ngIf="getBloque(dia, bloqueKey).ramoId || getBloque(dia, bloqueKey).ramo2Id" 
                     [class.filled]="getBloque(dia, bloqueKey).ramo2Id">
                  
                  <select class="ramo-select-visible" 
                          [ngModel]="getBloque(dia, bloqueKey).ramo2Id" 
                          (ngModelChange)="asignarRamo(getBloque(dia, bloqueKey), $event, true)"
                          [class.empty-select]="!getBloque(dia, bloqueKey).ramo2Id">
                    <option [ngValue]="null">+ Añadir tope horario</option>
                    <option *ngFor="let ramo of ramosCursando" [ngValue]="ramo.id">
                      {{ ramo.nombre }}
                    </option>
                  </select>

                  <input *ngIf="getBloque(dia, bloqueKey).ramo2Id"
                         type="text" 
                         class="detalle-input" 
                         [(ngModel)]="getBloque(dia, bloqueKey).detalle2"
                         (blur)="actualizarDetalle(getBloque(dia, bloqueKey))"
                         (keyup.enter)="actualizarDetalle(getBloque(dia, bloqueKey))"
                         placeholder="Detalle (Ej: TEO)" />
                </div>

              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
