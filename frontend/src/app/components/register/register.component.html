<div class="auth-page animated-bg">
  <div class="auth-container glass-panel">
    
    <div class="auth-left">
      <div class="auth-brand">
        <div class="brand-icon">
          <i class="bi bi-mortarboard-fill"></i>
        </div>
        <h1>AULA</h1>
        <p>Crea tu cuenta y comienza a gestionar tu progreso académico</p>
      </div>
      
      <div class="auth-features">
        <div class="feature">
          <i class="bi bi-grid-3x3-gap-fill"></i>
          <span>Gestiona tu malla y avance</span>
        </div>
        <div class="feature">
          <i class="bi bi-journal-check"></i>
          <span>Calcula notas y promedios</span>
        </div>
        <div class="feature">
          <i class="bi bi-calendar3"></i>
          <span>Organiza horarios y eventos</span>
        </div>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-form-container">
        <div class="card-header">
          <h2>Crear Cuenta</h2>
          <p>Completa tus datos para registrarte</p>
        </div>

        <div class="form-group">
          <label for="reg-nombre">
            <i class="bi bi-person"></i> Nombre
          </label>
          <div class="input-wrapper">
            <i class="bi bi-person input-icon"></i>
            <input id="reg-nombre" type="text" [(ngModel)]="nombre" placeholder="Tu nombre completo"
              autocomplete="name" autofocus />
          </div>
        </div>

        <div class="form-group">
          <label for="reg-email">
            <i class="bi bi-envelope"></i> Email
          </label>
          <div class="input-wrapper">
            <i class="bi bi-envelope input-icon"></i>
            <input id="reg-email" type="email" [(ngModel)]="email" placeholder="tu@email.com"
              autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label for="reg-password">
            <i class="bi bi-lock"></i> Contraseña
          </label>
          <div class="input-wrapper">
            <i class="bi bi-lock input-icon"></i>
            <input id="reg-password" type="password" [(ngModel)]="password" placeholder="Mínimo 6 caracteres"
              autocomplete="new-password" (keyup.enter)="register()" />
          </div>
        </div>

        <div class="form-actions">
          <div class="checkbox-wrapper">
            <input type="checkbox" id="terminos" [(ngModel)]="terminosAceptados" name="terminos" required />
            <label for="terminos">
              Acepto los <a href="javascript:void(0)" (click)="mostrarTerminos()" class="forgot-link">Términos y Condiciones</a>
            </label>
          </div>
        </div>

        <div class="error-msg" *ngIf="error">
          <i class="bi bi-exclamation-triangle-fill"></i>
          {{ error }}
        </div>

        <button class="btn-submit" (click)="register()" [disabled]="cargando || !terminosAceptados">
          <i class="bi bi-person-plus-fill" *ngIf="!cargando"></i>
          <i class="bi bi-arrow-repeat spin" *ngIf="cargando"></i>
          {{ cargando ? 'Registrando...' : 'Crear cuenta' }}
        </button>

        <div class="auth-divider">
          <span>o</span>
        </div>

        <p class="auth-link">
          ¿Ya tienes cuenta?
          <a routerLink="/login">Inicia sesión <i class="bi bi-arrow-right"></i></a>
        </p>
      </div>
    </div>
    
  </div>
</div>
