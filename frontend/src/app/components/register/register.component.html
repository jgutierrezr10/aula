<div class="container">
  <div class="card">
    <h2>🎓 Avance Curricular</h2>
    <h3>Crear cuenta</h3>

    <div class="form-group">
      <label>Nombre</label>
      <input type="text" [(ngModel)]="nombre" placeholder="Tu nombre" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="tu@email.com" />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" />
    </div>

    <div class="error" *ngIf="error">{{ error }}</div>

    <button (click)="register()" [disabled]="cargando">
      {{ cargando ? 'Registrando...' : 'Registrarse' }}
    </button>

    <p class="link">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
  </div>
</div>
