<div class="auth-page animated-bg">
  <div class="auth-container glass-panel">
    
    <div class="auth-left">
      <div class="auth-brand">
        <div class="brand-icon">
          <img src="assets/images/logo.png" alt="AULA Logo" class="brand-logo-img" />
        </div>
        <h1>AULA</h1>
        <p>Visualiza y gestiona tu progreso académico de forma inteligente</p>
      </div>
      
      <div class="auth-features">
        <div class="feature">
          <i class="bi bi-grid-3x3-gap-fill"></i>
          <span>Gestiona tu malla y avance</span>
        </div>
        <div class="feature">
          <i class="bi bi-journal-check"></i>
          <span>Calcula notas y promedios</span>
        </div>
        <div class="feature">
          <i class="bi bi-calendar3"></i>
          <span>Organiza horarios y eventos</span>
        </div>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-form-container">
        <div class="card-header">
          <h2>Iniciar Sesión</h2>
          <p>Ingresa tus credenciales para continuar</p>
        </div>

        <div class="form-group">
          <label for="login-email">
            <i class="bi bi-person"></i> Email o nombre
          </label>
          <div class="input-wrapper">
            <i class="bi bi-person input-icon"></i>
            <input id="login-email" type="text" [(ngModel)]="email" placeholder="tu@email.com o tu nombre"
              autocomplete="username" autofocus />
          </div>
        </div>

        <div class="form-group">
          <label for="login-password">
            <i class="bi bi-lock"></i> Contraseña
          </label>
          <div class="input-wrapper">
            <i class="bi bi-lock input-icon"></i>
            <input id="login-password" [type]="mostrarPassword ? 'text' : 'password'" [(ngModel)]="password" placeholder="••••••••"
              autocomplete="current-password" (keyup.enter)="login()" style="padding-right: 48px;" />
            <i class="toggle-password bi" [ngClass]="mostrarPassword ? 'bi-eye-slash' : 'bi-eye'" 
               (click)="mostrarPassword = !mostrarPassword"></i>
          </div>
        </div>

        <div class="form-actions">
          <div class="checkbox-wrapper">
            <input type="checkbox" id="login-recordar" [(ngModel)]="recordarme" />
            <label for="login-recordar">Guardar sesión</label>
          </div>
          <a href="javascript:void(0)" (click)="recuperarPassword()" class="forgot-password-link">¿Olvidaste tu contraseña?</a>
        </div>

        <div class="error-msg" *ngIf="error">
          <i class="bi bi-exclamation-triangle-fill"></i>
          {{ error }}
        </div>

        <button class="btn-submit" (click)="login()" [disabled]="cargando">
          <i class="bi bi-box-arrow-in-right" *ngIf="!cargando"></i>
          <i class="bi bi-arrow-repeat spin" *ngIf="cargando"></i>
          {{ cargando ? 'Ingresando...' : 'Ingresar' }}
        </button>

        <div class="auth-divider">
          <span>o</span>
        </div>

        <div style="margin-bottom: 20px;">
          <div id="google-btn"></div>
        </div>

        <p class="auth-link">
          ¿No tienes cuenta?
          <a routerLink="/register">Regístrate aquí <i class="bi bi-arrow-right"></i></a>
        </p>
      </div>
    </div>
    
  </div>
</div>
