<div class="auth-page">
  <div class="auth-left">
    <div class="auth-brand">
      <div class="brand-icon">
        <i class="bi bi-mortarboard-fill"></i>
      </div>
      <h1>AULA</h1>
      <p>Visualiza y gestiona tu progreso académico de forma inteligente</p>
    </div>
    <div class="auth-features">
      <div class="feature">
        <i class="bi bi-grid-3x3-gap-fill"></i>
        <span>Malla interactiva</span>
      </div>
      <div class="feature">
        <i class="bi bi-graph-up-arrow"></i>
        <span>Seguimiento de avance</span>
      </div>
      <div class="feature">
        <i class="bi bi-cloud-arrow-up-fill"></i>
        <span>Importa tu malla</span>
      </div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <div class="card-header">
        <h2>Iniciar Sesión</h2>
        <p>Ingresa tus credenciales para continuar</p>
      </div>

      <div class="form-group">
        <label for="login-email">
          <i class="bi bi-person"></i> Email o nombre de usuario
        </label>
        <div class="input-wrapper">
          <i class="bi bi-person input-icon"></i>
          <input id="login-email" type="text" [(ngModel)]="email" placeholder="tu@email.com o tu nombre"
            autocomplete="username" autofocus />
        </div>
      </div>

      <div class="form-group">
        <label for="login-password">
          <i class="bi bi-lock"></i> Contraseña
        </label>
        <div class="input-wrapper">
          <i class="bi bi-lock input-icon"></i>
          <input id="login-password" type="password" [(ngModel)]="password" placeholder="••••••••"
            autocomplete="current-password" (keyup.enter)="login()" />
        </div>
      </div>

      <div class="error-msg" *ngIf="error">
        <i class="bi bi-exclamation-triangle-fill"></i>
        {{ error }}
      </div>

      <button class="btn-submit" (click)="login()" [disabled]="cargando">
        <i class="bi bi-box-arrow-in-right" *ngIf="!cargando"></i>
        <i class="bi bi-arrow-repeat spin" *ngIf="cargando"></i>
        {{ cargando ? 'Ingresando...' : 'Ingresar' }}
      </button>

      <div class="auth-divider">
        <span>o</span>
      </div>

      <p class="auth-link">
        ¿No tienes cuenta?
        <a routerLink="/register">
          Regístrate aquí <i class="bi bi-arrow-right"></i>
        </a>
      </p>
    </div>
  </div>
</div>
