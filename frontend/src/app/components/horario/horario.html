<div class="horario-page">
  <div class="top-bar">
    <a routerLink="/dashboard" class="btn-back">
      <i class="bi bi-arrow-left"></i> Volver al Dashboard
    </a>
    <div class="page-title">
      <i class="bi bi-calendar3"></i>
      <h1>Mi Horario</h1>
    </div>
    <button class="btn-clean" (click)="limpiarHorario()">
      <i class="bi bi-trash3"></i> Limpiar Todo
    </button>
  </div>

  <div class="horario-container">
    <div class="info-banner" *ngIf="ramosCursando.length === 0">
      <i class="bi bi-info-circle-fill"></i>
      <span>No tienes ramos marcados como "Cursando" en tu Malla. Ve a tu malla y marca los ramos que estás tomando actualmente para poder armar tu horario.</span>
    </div>

    <div class="grid-wrapper">
      <table class="horario-table">
        <thead>
          <tr>
            <th class="time-col">Hora / Día</th>
            <th *ngFor="let dia of dias">{{ dia }}</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let hora of horas">
            <td class="time-cell">{{ hora }}</td>
            <td *ngFor="let dia of dias" class="drop-cell">
              <div class="cell-content" [class.has-ramo]="getBloque(dia, hora).ramoId !== null">
                <select 
                  class="ramo-select" 
                  [ngModel]="getBloque(dia, hora).ramoId" 
                  (change)="asignarRamo(getBloque(dia, hora), $event)">
                  <option [ngValue]="null">---</option>
                  <option *ngFor="let ramo of ramosCursando" [value]="ramo.id">
                    {{ ramo.nombre }}
                  </option>
                </select>
                <div class="ramo-display" *ngIf="getBloque(dia, hora).ramoId">
                  {{ getRamoNombre(getBloque(dia, hora).ramoId) }}
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
